{% extends 'main/base.html' %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; height: calc(100vh - 70px); background: #f5f7fa;">
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px;">
        <h2 style="margin-bottom: 20px; color: #2c3e50;">Change Password</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 10px; border-radius: 6px; border: none; background: #3498db; color: white; font-weight: 600; cursor: pointer;">
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'main/base.html' %}

{% block extra_head %}
<style>
    /* 1. Style Django's default error messages */
    ul.errorlist {
        color: #c0392b;
        background: #fadbd8;
        padding: 12px 15px;
        border-radius: 6px;
        list-style-type: none; /* Removes the ugly bullets */
        font-size: 13px;
        margin-top: 0;
        margin-bottom: 15px;
        border-left: 4px solid #e74c3c;
    }
    
    /* 2. Clean up the help text (the password rules) */
    .helptext {
        font-size: 12px;
        color: #7f8c8d;
        display: block;
        margin-bottom: 15px;
        line-height: 1.4;
    }

    /* 3. Style the inputs so they fill the box cleanly */
    .auth-form input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }
    .auth-form input:focus {
        border-color: #3498db;
        outline: none;
    }
</style>
{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; min-height: calc(100vh - 70px); background: #f5f7fa; padding: 40px 20px; box-sizing: border-box; overflow-y: auto;">
    
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 380px; max-width: 100%; height: fit-content;">
        
        <h2 style="margin-top: 0; margin-bottom: 20px; color: #2c3e50; text-align: center;">Change Password</h2>
        
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" style="margin-top: 10px; width: 100%; padding: 12px; border-radius: 6px; border: none; background: #3498db; color: white; font-weight: 600; cursor: pointer; font-size: 15px;">
                Update Password
            </button>
        </form>

    </div>
</div>
{% endblock %}

{% extends 'main/base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; height: calc(100vh - 70px); background: #f5f7fa;">
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center;">
        <h2 style="color: #27ae60; margin-bottom: 10px;">Success!</h2>
        <p style="color: #666; margin-bottom: 20px;">Your password has been changed successfully.</p>
        <a href="{% url 'dashboard' %}" class="btn" style="display: block; width: 100%; padding: 10px; border-radius: 6px; border: none; background: #3498db; color: white; font-weight: 600; text-decoration: none; box-sizing: border-box;">
            Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}

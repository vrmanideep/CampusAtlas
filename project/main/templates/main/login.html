{% extends 'main/base.html' %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* Full screen gradient background */
    body, html { 
        height: 100%; 
        margin: 0; 
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }
    header { display: none; } /* Hide the default top nav for a cleaner auth screen */
    
    .auth-container {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }
    
    /* Modern Glass Card */
    .auth-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-sizing: border-box;
    }

    .auth-header i { font-size: 3rem; color: #3498db; margin-bottom: 15px; }
    .auth-header h2 { margin: 0 0 25px 0; color: #2c3e50; font-size: 1.8rem; }

    /* Input Styling */
    .input-group { position: relative; margin-bottom: 20px; }
    .input-group i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #7f8c8d;
    }
    .input-group input {
        width: 100%;
        padding: 15px 15px 15px 45px;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-sizing: border-box;
        font-size: 1rem;
        transition: all 0.3s;
        background: #fdfdfd;
    }
    .input-group input:focus {
        border-color: #3498db;
        outline: none;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
    }

    /* Button Styling */
    .auth-btn {
        width: 100%;
        padding: 15px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s, transform 0.1s;
        margin-top: 10px;
    }
    .auth-btn:hover { background: #2980b9; }
    .auth-btn:active { transform: scale(0.98); }

    /* Footer Links & Errors */
    .auth-footer { margin-top: 25px; color: #7f8c8d; font-size: 0.95rem; }
    .auth-footer a { color: #3498db; text-decoration: none; font-weight: 600; transition: color 0.3s; }
    .auth-footer a:hover { color: #2980b9; }
    
    .error-msg {
        background: #fee2e2;
        color: #dc2626;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fa-solid fa-map-location-dot"></i>
            <h2>Campus Atlas</h2>
        </div>
        
        {% if error %}
            <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="auth-btn">Log In</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{% url 'signup' %}">Sign up here</a>
        </div>
    </div>
</div>
{% endblock %}

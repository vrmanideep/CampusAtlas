{% extends 'main/base.html' %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body, html { height: 100%; margin: 0; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    header { display: none; }
    
    /* FIX: Changed to allow scrolling for long forms */
    .auth-container { 
        display: flex; align-items: flex-start; justify-content: center; 
        min-height: 100vh; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; 
    }
    
    .auth-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
        box-sizing: border-box;
        height: fit-content;
    }

    .auth-header { text-align: center; }
    .auth-header i { font-size: 3rem; color: #27ae60; margin-bottom: 15px; }
    .auth-header h2 { margin: 0 0 25px 0; color: #2c3e50; font-size: 1.8rem; }

    /* --- DJANGO FORM STYLING --- */
    
    /* Style Django's default error messages */
    ul.errorlist {
        color: #c0392b; background: #fadbd8; padding: 12px 15px; border-radius: 6px; 
        list-style-type: none; font-size: 13px; margin-top: 0; margin-bottom: 15px; 
        border-left: 4px solid #e74c3c;
    }
    
    /* Clean up the help text (the password rules) */
    .helptext {
        font-size: 12px; color: #7f8c8d; display: block; margin-bottom: 15px; line-height: 1.4;
    }

    /* Style the inputs to match your green theme */
    .auth-form input {
        width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; 
        margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; transition: all 0.3s; background: #fdfdfd;
    }
    .auth-form input:focus { border-color: #27ae60; outline: none; box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.2); }
    .auth-form label { display: block; margin-bottom: 5px; font-weight: 600; color: #2c3e50; font-size: 0.95rem; }
    /* ----------------------------- */

    .auth-btn {
        width: 100%; padding: 15px; background: #27ae60; color: white; border: none; 
        border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; 
        transition: background 0.3s, transform 0.1s; margin-top: 10px;
    }
    .auth-btn:hover { background: #219653; }
    .auth-btn:active { transform: scale(0.98); }

    .auth-footer { margin-top: 25px; color: #7f8c8d; font-size: 0.95rem; text-align: center; }
    .auth-footer a { color: #27ae60; text-decoration: none; font-weight: 600; transition: color 0.3s; }
    .auth-footer a:hover { color: #219653; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fa-solid fa-user-plus"></i>
            <h2>Create Account</h2>
        </div>
        
        <form method="POST" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Log in here</a>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'main/base.html' %}

{% block extra_head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<style>
    body, html { margin: 0; overflow: hidden; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #map { position: fixed; top: 70px; bottom: 0; width: 100%; z-index: 1; background: white; }
    
    /* UI Panels */
    .panel, .modal-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
    .panel { position: absolute; top: 90px; left: 20px; width: 300px; z-index: 999; }
    
    /* Welcome Overlay */
    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .close-modal { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: #95a5a6; }
    .close-modal:hover { color: #e74c3c; }
    
    /* Inputs & Buttons */
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
    input:focus { border-color: #3498db; }
    .btn { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    
    /* Dropdowns */
    .dropdown { position: absolute; width: 100%; background: white; list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; box-shadow: 0 5px 10px rgba(0,0,0,0.1); z-index: 1000; border-radius: 0 0 8px 8px; }
    .dropdown li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
    .dropdown li:hover { background: #f8f9fa; color: #3498db; }

    /* Navigation Banner */
    #navBanner {
        position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
        background: #27ae60; color: white; padding: 15px 25px;
        border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        z-index: 10000; text-align: center; font-size: 1.1rem;
        min-width: 280px; display: none;
    }

    /* Layer Control Customization */
    .leaflet-control-layers { margin-top: 80px !important; border-radius: 8px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important; }
</style>
{% endblock %}

{% block content %}
<div id="overlay" style="display:none;">
    <div class="modal-card" style="position: relative;">
        <span class="close-modal" onclick="$('overlay').style.display='none'">&times;</span>
        <h3 style="margin-top:0;">Campus Atlas</h3>
        <p style="color:#666; font-size:14px;">Where would you like to go?</p>
        <div style="position: relative;">
            <input type="text" id="wSearch" placeholder="Search rooms, labs, or buildings..." autocomplete="off">
            <ul id="wDrop" class="dropdown" style="display:none;"></ul>
        </div>
        <button class="btn" style="margin-top:10px;" onclick="$('overlay').style.display='none'">Just Explore</button>
    </div>
</div>

<div class="panel">
    <h3 style="margin-top:0; color:#2c3e50;">Navigator</h3>
    <div style="position: relative;">
        <input type="text" id="mSearch" placeholder="Enter destination..." autocomplete="off">
        <ul id="mDrop" class="dropdown" style="display:none;"></ul>
    </div>
    <p id="msg" style="color:#7f8c8d; font-size:13px; margin:5px 0 0 0;"><i class="fa-solid fa-location-arrow"></i> Initializing GPS...</p>
</div>

<div id="map"></div>
<div id="navBanner"></div>

{{ locations_json|json_script:"locs" }}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDQP0Pap_Eyt_zDCnGGGPQvuaHpdlCf46Q"></script>
<script src="https://unpkg.com/leaflet.gridlayer.googlemutant@latest/dist/Leaflet.GoogleMutant.js"></script>

<script>
    const $ = id => document.getElementById(id);
    
    // 1. Define the style to hide all default Google POIs
    const hidePOIs = [
        { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
        { featureType: "transit", stylers: [{ visibility: "off" }] }
    ];

    // 2. Init Map and Google Layers with Styles
    const map = L.map('map', {zoomControl: false}).setView([16.494, 80.499], 16);
    L.control.zoom({position: 'topright'}).addTo(map);

    const roadmap = L.gridLayer.googleMutant({ type: 'roadmap', styles: hidePOIs });
    const satellite = L.gridLayer.googleMutant({ type: 'satellite', styles: hidePOIs });
    
    roadmap.addTo(map);

    L.control.layers({"Street View": roadmap, "Satellite": satellite}, null, {
        position: 'topright', collapsed: false 
    }).addTo(map);

    // Global Vars
    let uLat, uLng, marker, rc, steps=[], currStep=0, routeCoords=[];
    const dbLocs = JSON.parse($('locs').textContent);

    // 3. GPS Tracking
    map.locate({setView: true, maxZoom: 18, watch: true, enableHighAccuracy: true});
    map.on('locationfound', e => {
        uLat = e.latlng.lat; uLng = e.latlng.lng;
        if (marker) marker.setLatLng(e.latlng);
        else marker = L.circleMarker(e.latlng, {radius:8, color:'white', fillColor:'#27ae60', fillOpacity:1, weight:3}).addTo(map);
        $('msg').innerHTML = "🟢 GPS Active";

        // Live Turn Logic
        if (steps.length > 0 && currStep < steps.length) {
            let distToTarget = map.distance([uLat, uLng], routeCoords[steps[currStep].index]);
            if (distToTarget < 15) { currStep++; updateNav(); }
        }
    });

    // 4. Admin Functionality
    if ("{{ user.is_superuser }}" === "True") {
        map.on('contextmenu', e => {
            if (confirm(`Add new location at ${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}?`)) {
                window.location.href = `/admin/main/location/add/?latitude=${e.latlng.lat}&longitude=${e.latlng.lng}`;
            }
        });
    }

    // 5. Routing Engine
    const drawRoute = (lat, lng) => {
        if (!uLat) return alert("Waiting for GPS signal...");
        if (rc) map.removeControl(rc);
        
        rc = L.Routing.control({
            waypoints: [L.latLng(uLat, uLng), L.latLng(lat, lng)],
            router: L.Routing.osrmv1({ profile: 'foot' }),
            show: false,
            addWaypoints: false
        }).on('routesfound', e => {
            let r = e.routes[0];
            routeCoords = r.coordinates;
            steps = r.instructions.filter(s => /turn|arrive/i.test(s.text));
            currStep = 0;
            updateNav();
            map.fitBounds(L.polyline(routeCoords).getBounds(), {padding: [50, 50]});
        }).addTo(map);
    };

    const updateNav = () => {
        const b = $('navBanner');
        if (currStep >= steps.length) {
            b.innerHTML = "🏁 You have arrived!";
            return setTimeout(() => b.style.display='none', 5000);
        }
        b.style.display = 'block';
        let txt = steps[currStep].text.replace(/Head (north|south|east|west\w*)/gi, "Start walking");
        txt = txt.replace(/footway|pedestrian/gi, "path");
        b.innerHTML = `<strong>${txt}</strong><br><small>${Math.round(steps[currStep].distance)}m remaining</small>`;
    };

    // 6. Strict Local Search Logic
    const setupSearch = (inp, drop) => {
        $(inp).oninput = e => {
            let q = e.target.value.toLowerCase().trim();
            $(drop).innerHTML = '';
            if (!q) return $(drop).style.display='none';

            let local = dbLocs.filter(l => l.name.toLowerCase().includes(q));
            
            if (local.length > 0) {
                renderList(local, drop);
            } else {
                // Show "Not Found" if it doesn't match the database
                $(drop).innerHTML = `<li style="color: #e74c3c; cursor: default;">❌ Location not found</li>`;
                $(drop).style.display = 'block';
            }
        };
    };

    const renderList = (data, drop) => {
        $(drop).innerHTML = '';
        data.slice(0, 5).forEach(item => {
            let li = document.createElement('li');
            li.innerHTML = `📍 <b>${item.name}</b>`;
            li.onclick = () => {
                $('overlay').style.display='none';
                $(drop).style.display='none';
                $('mSearch').value = item.name;
                drawRoute(item.latitude, item.longitude);
            };
            $(drop).appendChild(li);
        });
        $(drop).style.display = 'block';
    };

    // 7. Initialize
    $('overlay').style.display = 'flex';
    setupSearch('wSearch', 'wDrop');
    setupSearch('mSearch', 'mDrop');
</script>
{% endblock %}
